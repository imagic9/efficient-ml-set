# D3 uses `m0_run`, `ratios`, `round_to`: the registered per-group sensitivity
# measurement (results/optimize/m3_prune/sensitivity_protocol.md). D4's
# candidate recipe below is fixed by results/optimize/m3_prune/m3_registration.md
# — the same config file so the run explains itself, per DESIGN §9.1.

m0_run: results/training/c2/c2_m0_fp32_seed42_20260716T061203Z
# best.pt must hash to the run's recorded checkpoint (enforced at load):
# 42079c362013898c3354a65bbf8ced4524504c0dfc20cb6efaa00dabe9209074

